<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Burgos Abogados | Abogados en Mérida</title>

<meta name="description" content="Abogados en Mérida. Especialistas en derecho familiar, civil y mercantil.">

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* VARIABLES */
:root{
--coral:#d96c52;
--bg:#f7f4ee;
--text:#111;
}

/* BASE */
body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* 🔥 HEADER NEW YORK STYLE */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(12px);
transition:.4s ease;
z-index:100;
}

/* SCROLL EFFECT */
header.scrolled{
padding:10px 60px;
background:rgba(255,255,255,0.95);
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* LOGO */
.logo{
display:flex;
align-items:center;
}

.logo img{
height:95px;
width:auto;
object-fit:contain;
transition:.3s;
}

header.scrolled .logo img{
height:75px;
}

/* BOTÓN */
.btn{
background:var(--coral);
color:white;
padding:12px 22px;
border-radius:30px;
text-decoration:none;
font-weight:500;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f') center/cover;
}

.hero h1{
font-family:'Playfair Display';
font-size:3em;
max-width:800px;
}

/* RESPONSIVE */
@media(max-width:768px){

header{
padding:12px 20px;
}

.logo img{
height:70px;
}

header.scrolled .logo img{
height:60px;
}

.btn{
padding:10px 16px;
font-size:14px;
}

.hero h1{
font-size:2em;
}

}

</style>
</head>

<body>

<header id="header">

<div class="logo">
<img src="logo.png" alt="Burgos Abogados">
</div>

<a href="https://wa.me/529996082755" class="btn">
Consulta inmediata
</a>

</header>

<section class="hero">
<h1>Crecemos contigo, con estrategia y respaldo legal.</h1>
</section>

<script>

/* HEADER INTELIGENTE */
window.addEventListener("scroll",()=>{
let header=document.getElementById("header");
header.classList.toggle("scrolled",window.scrollY>50);
});

</script>

</body>
</html>
